<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 10" width="1400" height="1000">
  <!-- Winnow icon: pixel-art [>> with dissolve trail -->
  <!-- Grid: 14 cols × 10 rows, each cell = 1×1 -->
  <defs>
    <rect id="c" width="1" height="1" fill="#CC3333"/>
  </defs>

  <!-- Bracket [ — vertical bar (cols 0-1, rows 0-9) -->
  <use href="#c" x="0" y="0"/><use href="#c" x="1" y="0"/>
  <use href="#c" x="0" y="1"/><use href="#c" x="1" y="1"/>
  <use href="#c" x="0" y="2"/><use href="#c" x="1" y="2"/>
  <use href="#c" x="0" y="3"/><use href="#c" x="1" y="3"/>
  <use href="#c" x="0" y="4"/><use href="#c" x="1" y="4"/>
  <use href="#c" x="0" y="5"/><use href="#c" x="1" y="5"/>
  <use href="#c" x="0" y="6"/><use href="#c" x="1" y="6"/>
  <use href="#c" x="0" y="7"/><use href="#c" x="1" y="7"/>
  <use href="#c" x="0" y="8"/><use href="#c" x="1" y="8"/>
  <use href="#c" x="0" y="9"/><use href="#c" x="1" y="9"/>

  <!-- Bracket [ — top serif (cols 2-3, rows 0-1) -->
  <use href="#c" x="2" y="0"/><use href="#c" x="3" y="0"/>
  <use href="#c" x="2" y="1"/><use href="#c" x="3" y="1"/>

  <!-- Bracket [ — bottom serif (cols 2-3, rows 8-9) -->
  <use href="#c" x="2" y="8"/><use href="#c" x="3" y="8"/>
  <use href="#c" x="2" y="9"/><use href="#c" x="3" y="9"/>

  <!-- First chevron > -->
  <use href="#c" x="5" y="0"/><use href="#c" x="5" y="1"/>
  <use href="#c" x="6" y="2"/><use href="#c" x="6" y="3"/>
  <use href="#c" x="7" y="4"/><use href="#c" x="7" y="5"/>
  <use href="#c" x="6" y="6"/><use href="#c" x="6" y="7"/>
  <use href="#c" x="5" y="8"/><use href="#c" x="5" y="9"/>

  <!-- Second chevron > -->
  <use href="#c" x="8"  y="0"/><use href="#c" x="8"  y="1"/>
  <use href="#c" x="9"  y="2"/><use href="#c" x="9"  y="3"/>
  <use href="#c" x="10" y="4"/><use href="#c" x="10" y="5"/>
  <use href="#c" x="9"  y="6"/><use href="#c" x="9"  y="7"/>
  <use href="#c" x="8"  y="8"/><use href="#c" x="8"  y="9"/>

  <!-- Dissolve trail (partial third chevron, single blocks) -->
  <use href="#c" x="11" y="0"/>
  <use href="#c" x="12" y="2"/>
  <use href="#c" x="13" y="4"/>
  <use href="#c" x="12" y="7"/>
  <use href="#c" x="11" y="9"/>
</svg>
